<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Owner Panel | Jamison Protection</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <div id="assignShiftModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; padding-top:120px;">
        <div style="background:#1f1f1f; color:white; width:420px; margin:auto; padding:25px; border-radius:10px; border-left:5px solid #e63946;">
            <h2>Assign Shift</h2>

            <label>Select Worker:</label>
            <select id="assignWorkerSelect"></select>

            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="saveAssignedShift()">Assign Shift</button>
                <button onclick="closeAssignModal()" style="background:#444;">Cancel</button>
            </div>
        </div>
    </div>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        header {
            background: #1c1c1c;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #444;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        main {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        form {
            margin-bottom: 30px;
            background: #1f1f1f;
            padding: 20px;
            border-left: 5px solid #e63946;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        input, textarea, select {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 10px;
            margin: 8px 0;
            width: 100%;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #e63946;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #c5303d;
        }

        .shift {
            background: #1f1f1f;
            margin: 15px 0;
            padding: 15px;
            border-left: 5px solid #1c1c1c;
            border-radius: 8px;
        }

        .delete-btn {
            background: #e63946;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 14px;
            border-radius: 8px;
            min-width: 110px;
        }

        .edit-btn {
            background: #444;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 14px;
            border-radius: 8px;
            min-width: 110px;
        }

        .edit-btn:hover {
            background: #666;
        }

        #toolbar {
            position: sticky;
            top: 0;
            z-index: 999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252525;
            padding: 10px 16px;
            border-bottom: 2px solid #e63946;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        #selectedCount {
            font-size: 15px;
            color: #f2f2f2;
        }

        #securityLogFilter input, #securityLogFilter button {
            margin: 5px;
            padding: 8px;
            border-radius: 5px;
            border: none;
            width: auto;
        }

        nav {
            margin-bottom: 15px;
        }

        nav button {
            background: #444;
            margin-right: 5px;
            width: auto;
        }

        nav button:hover {
            background: #666;
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }

        .payroll-card {
            background: #1f1f1f;
            border-left: 5px solid #4CAF50;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .payroll-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .payroll-table th, .payroll-table td {
            border: 1px solid #555;
            padding: 8px;
            text-align: center;
        }

        .payroll-table th {
            background: #333;
            color: white;
        }

        .total-row {
            background: #2e2e2e;
            font-weight: bold;
        }

        #submittedHoursContainer {
            background: #1f1f1f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        #ownerShiftCalendar {
            max-width: 1100px;
            margin-top: 20px;
            background: #1f1f1f;
            padding: 15px;
            border-radius: 10px;
        }

        .top-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .top-actions button {
            width: auto;
        }

        .fc {
            background: #1f1f1f;
            color: white;
        }

        .fc-toolbar-title {
            color: #f2c744;
        }

        .fc-button {
            background: #e63946 !important;
            border: none !important;
            color: white !important;
        }

        .fc-button:hover {
            background: #c5303d !important;
        }

        .fc-col-header-cell {
            background: #2a2a2a !important;
        }

        .fc-col-header-cell-cushion {
            color: #ffffff !important;
            text-decoration: none !important;
            font-weight: 700 !important;
        }

        .fc-daygrid-day-number {
            color: #f0f0f0 !important;
            text-decoration: none !important;
        }

        .fc-theme-standard th,
        .fc-theme-standard td,
        .fc-scrollgrid,
        .fc-scrollgrid table {
            border-color: #555 !important;
        }

        .fc-day-today {
            background: rgba(242, 199, 68, 0.08) !important;
        }
    </style>
</head>

<body>
<header>
    <h1>Owner Panel</h1>

    <nav>
        <button onclick="showTab('shifts')">Shifts</button>
        <button onclick="showTab('securityLogs')">Security Logs</button>
        <button onclick="showTab('payroll')">Payroll</button>
    </nav>

    <button class="logout-btn" onclick="logout()">Logout</button>

    <div class="top-actions">
        <button onclick="switchToWorker()">Switch to Worker View</button>
        <button onclick="goToAdmin()">Open Admin Panel</button>
        <button onclick="viewSubmittedHours()">View Submitted Hours</button>
        <button onclick="window.location.href='interview-list.html'">Manage Interviews</button>
    </div>
</header>

<main>
    <div id="shiftsTab" class="tab active">
        <h2>Create New Shift</h2>

        <form id="shiftForm" onsubmit="postShift(event)">
            <label>Date:</label>
            <input type="date" id="shiftDate" required>

            <label>Start Time:</label>
            <input type="time" id="shiftStart" required>

            <label>Expected End Time:</label>
            <input type="text" id="shiftEnd" placeholder="e.g. 5:00 PM or Until Dismissed" required>

            <label>Location:</label>
            <select id="shiftLocation" required>
                <option value="John Carroll School">John Carroll School</option>
            </select>

            <label>Work Position:</label>
            <input type="text" id="shiftPosition" placeholder="e.g. Front Desk" required>

            <label>Notes:</label>
            <textarea id="shiftNotes" placeholder="Additional notes..."></textarea>

            <button type="submit">Post Shift</button>
        </form>

        <h2>All Shifts</h2>

        <div style="margin-bottom: 15px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <input type="text" id="filterName" placeholder="Filter by worker name..." style="width:220px;">
            <input type="date" id="filterDate" style="width:auto;">

            <button onclick="loadShifts()">Apply Filter</button>
            <button onclick="clearFilters()">Clear</button>
            <button onclick="showAllShifts()">Show All Shifts</button>
        </div>

        <div id="shiftList"></div>

        <hr>

        <h2>Shift Calendar</h2>
        <div id="ownerShiftCalendar"></div>

        <hr>

        <div id="submittedHoursContainer" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Submitted Hours</h3>
                <button onclick="closeSubmittedHours()">Close ✖</button>
            </div>

            <div id="submittedHoursContent">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <div id="securityLogsTab" class="tab">
        <h2>Security Log Viewer</h2>

        <div id="securityLogFilter">
            <label>Date:</label>
            <input type="date" id="filterDateLog">

            <label>Worker Initials:</label>
            <input type="text" id="filterInitialsLog" placeholder="e.g. FJ">

            <button onclick="filterSecurityLogs()">Apply Filter</button>
            <button onclick="clearSecurityFilters()">Clear</button>
            <button onclick="exportSecurityLogs()">⬇ Export CSV</button>
        </div>

        <div id="securityLogContainer">
            <p>Loading logs...</p>
        </div>
    </div>

    <div id="payrollTab" class="tab">
        <h2>Payroll Summary</h2>

        <div style="margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <label>Start Date:</label>
            <input type="date" id="payrollStart" style="width:auto;">

            <label>End Date:</label>
            <input type="date" id="payrollEnd" style="width:auto;">

            <button onclick="loadPayroll()">Generate Payroll</button>
        </div>

        <div id="payrollContainer">
            <p>Enter a date range and click "Generate Payroll".</p>
        </div>
    </div>
</main>

<script>
    let selectedAssignShiftId = null;

async function openAssignModal(shiftId) {
    selectedAssignShiftId = shiftId;

    const res = await fetch('/api/users', { credentials: 'include' });
    const users = await res.json();

    const workers = users.filter(u => u.role === 'worker');
    const select = document.getElementById('assignWorkerSelect');

    select.innerHTML = workers.map(worker => `
        <option value="${worker.username}">${worker.username}</option>
    `).join('');

    document.getElementById('assignShiftModal').style.display = 'block';
}

function closeAssignModal() {
    document.getElementById('assignShiftModal').style.display = 'none';
    selectedAssignShiftId = null;
}

async function saveAssignedShift() {
    const username = document.getElementById('assignWorkerSelect').value;

    const res = await fetch(`/api/assign-shift/${selectedAssignShiftId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username })
    });

    const data = await res.json();
    alert(data.message);

    closeAssignModal();
    loadShifts();
    loadOwnerShiftCalendar();
}
    let ownerCalendar;

    function showTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
        document.getElementById(tabName + 'Tab').style.display = 'block';
    }

    async function loadShifts() {
        const name = document.getElementById('filterName')?.value.trim().toLowerCase() || '';
        const date = document.getElementById('filterDate')?.value || '';

        const res = await fetch('/api/view-all-shifts', { credentials: 'include' });
        if (res.status === 401) return location.href = 'login.html';

        const shifts = await res.json();

        const filtered = shifts.filter(s => {
            const claimedByText = typeof s.claimedBy === 'object'
                ? (s.claimedBy?.username || '')
                : (s.claimedBy || '');

            const matchName = !name || claimedByText.toLowerCase().includes(name);
            const matchDate = !date || s.date === date;

            return matchName && matchDate;
        });

        renderShiftList(filtered);
    }

    function renderShiftList(shifts) {
        const container = document.getElementById('shiftList');

        if (!shifts.length) {
            container.innerHTML = '<p>No shifts found.</p>';
            return;
        }

        container.innerHTML = `
            <div id="toolbar">
                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="selectAllShifts" onchange="toggleSelectAllShifts()" style="width:auto;">
                    Select All Visible
                </label>

                <div style="display:flex; align-items:center; gap:12px;">
                    <span id="selectedCount">0 selected</span>
                    <button onclick="deleteSelectedShifts()">🗑 Delete Selected</button>
                </div>
            </div>

            <div id="shiftContainer">
                ${shifts.map(s => `
                    <div class="shift" style="display:flex; justify-content:space-between; align-items:flex-start; gap:15px; border-left:5px solid ${s.claimedBy ? '#e63946' : '#444'};">
                        <div style="display:flex; align-items:flex-start; gap:12px; flex:1;">
                            <input
                                type="checkbox"
                                class="shift-checkbox"
                                value="${s._id}"
                                onchange="updateSelectedCount()"
                                style="width:auto; margin-top:4px;"
                            >

                            <div>
                                <strong>${s.date || 'No date'} — ${s.startTime || 'N/A'} to ${s.expectedEnd || 'N/A'}</strong><br>
                                Location: ${s.location || 'Unknown'}<br>
                                Position: ${s.position || 'Unassigned'}<br>
                                Status: ${s.status || 'available'}${s.status === 'dropped' && s.droppedBy ? ` by ${s.droppedBy}` : ''}<br>
                                Notes: ${s.notes || 'None'}<br>
                                Claimed by: ${typeof s.claimedBy === 'object' ? (s.claimedBy.username || 'Not claimed yet') : (s.claimedBy || 'Not claimed yet')}
                            </div>
                        </div>

                        <div style="display:flex; flex-direction:column; gap:8px;">
                            <button class="edit-btn" onclick="editShift('${s._id}')">✏️ Edit</button>
                            <button class="delete-btn" onclick="deleteShift('${s._id}')">🗑 Delete</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function showAllShifts() {
        document.getElementById('filterName').value = '';
        document.getElementById('filterDate').value = '';
        loadShifts();
    }

    function clearFilters() {
        document.getElementById('filterName').value = '';
        document.getElementById('filterDate').value = '';
        loadShifts();
    }

    function toggleSelectAllShifts() {
        const selectAll = document.getElementById('selectAllShifts');
        const checkboxes = document.querySelectorAll('.shift-checkbox');

        checkboxes.forEach(cb => {
            cb.checked = selectAll.checked;
        });

        updateSelectedCount();
    }

    function updateSelectedCount() {
        const checkboxes = document.querySelectorAll('.shift-checkbox');
        const checked = document.querySelectorAll('.shift-checkbox:checked').length;
        const counter = document.getElementById('selectedCount');
        const selectAll = document.getElementById('selectAllShifts');

        if (counter) counter.textContent = `${checked} selected`;

        if (selectAll) {
            selectAll.checked = checkboxes.length > 0 && checked === checkboxes.length;
        }
    }

    async function postShift(event) {
        event.preventDefault();

        const shift = {
            date: document.getElementById('shiftDate').value,
            startTime: document.getElementById('shiftStart').value,
            expectedEnd: document.getElementById('shiftEnd').value,
            location: document.getElementById('shiftLocation').value,
            position: document.getElementById('shiftPosition').value,
            notes: document.getElementById('shiftNotes').value
        };

        const res = await fetch('/api/shifts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(shift)
        });

        const data = await res.json();
        alert(data.message);

        document.getElementById('shiftForm').reset();
        loadShifts();
        loadOwnerShiftCalendar();
    }

    async function deleteShift(id) {
        if (!confirm('Are you sure you want to delete this shift?')) return;

        const res = await fetch(`/api/delete-shift/${id}`, {
            method: 'DELETE',
            credentials: 'include'
        });

        const data = await res.json();
        alert(data.message);

        loadShifts();
        loadOwnerShiftCalendar();
    }

    async function deleteSelectedShifts() {
        const checkboxes = document.querySelectorAll('.shift-checkbox:checked');

        if (checkboxes.length === 0) {
            alert('No shifts selected.');
            return;
        }

        if (!confirm(`Delete ${checkboxes.length} selected shift(s)?`)) return;

        const ids = Array.from(checkboxes).map(cb => cb.value);

        const res = await fetch('/api/delete-multiple-shifts', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ ids })
        });

        const data = await res.json();
        alert(data.message);

        loadShifts();
        loadOwnerShiftCalendar();
    }

    async function editShift(id) {
        const date = prompt('Enter new shift date (YYYY-MM-DD):');
        if (!date) return;

        const startTime = prompt('Enter new start time (HH:MM):');
        if (!startTime) return;

        const expectedEnd = prompt('Enter expected end time:');
        if (!expectedEnd) return;

        const location = prompt('Enter location:', 'John Carroll School');
        if (!location) return;

        const position = prompt('Enter work position:');
        if (!position) return;

        const notes = prompt('Enter notes:', '');

        const res = await fetch(`/api/edit-shift/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                date,
                startTime,
                expectedEnd,
                location,
                position,
                notes
            })
        });

        const data = await res.json();
        alert(data.message);

        loadShifts();
        loadOwnerShiftCalendar();
    }

    async function viewSubmittedHours() {
        const container = document.getElementById('submittedHoursContainer');
        const content = document.getElementById('submittedHoursContent');

        container.style.display = 'block';
        content.innerHTML = '<p>Loading submitted logs...</p>';

        try {
            const res = await fetch('/api/view-logs', { credentials: 'include' });

            if (!res.ok) {
                content.innerHTML = '<p>Failed to load logs.</p>';
                return;
            }

            const data = await res.json();

            if (!Object.keys(data).length) {
                content.innerHTML = '<p>No submitted hours found.</p>';
                return;
            }

            content.innerHTML = Object.entries(data).map(([user, logs]) => `
                <div class="payroll-card">
                    <h3>${user}</h3>
                    <table class="payroll-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Start</th>
                                <th>End</th>
                                <th>Location</th>
                                <th>Position</th>
                                <th>Hours</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${logs.map(l => `
                                <tr>
                                    <td>${l.date}</td>
                                    <td>${l.startTime}</td>
                                    <td>${l.endTime}</td>
                                    <td>${l.location}</td>
                                    <td>${l.position}</td>
                                    <td>${l.hours}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        } catch (err) {
            console.error('Error fetching logs:', err);
            content.innerHTML = '<p>Error loading logs.</p>';
        }
    }

    function closeSubmittedHours() {
        document.getElementById('submittedHoursContainer').style.display = 'none';
    }

    async function loadPayroll() {
        const startDate = document.getElementById('payrollStart').value;
        const endDate = document.getElementById('payrollEnd').value;

        if (!startDate || !endDate) {
            alert('Please select a start and end date.');
            return;
        }

        const res = await fetch(`/api/payroll?startDate=${startDate}&endDate=${endDate}`, { credentials: 'include' });
        const data = await res.json();
        const container = document.getElementById('payrollContainer');

        if (!data.length) {
            container.innerHTML = '<p>No logged hours found for that date range.</p>';
            return;
        }

        container.innerHTML = data.map(worker => `
            <div class="payroll-card">
                <h3>${worker.user}</h3>
                <p><strong>Rate:</strong> $${worker.rate}/hr</p>

                <table class="payroll-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Start</th>
                            <th>End</th>
                            <th>Location</th>
                            <th>Position</th>
                            <th>Hours</th>
                            <th>Pay ($)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${worker.entries.map(entry => `
                            <tr>
                                <td>${entry.date}</td>
                                <td>${entry.start}</td>
                                <td>${entry.end}</td>
                                <td>${entry.location}</td>
                                <td>${entry.position}</td>
                                <td>${entry.hours}</td>
                                <td>${entry.pay}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                    <tfoot>
                        <tr class="total-row">
                            <td colspan="5"><strong>Total</strong></td>
                            <td><strong>${worker.totalHours}</strong></td>
                            <td><strong>$${worker.totalPay}</strong></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        `).join('');
    }

    async function loadSecurityLogs(date = '', initials = '') {
        try {
            let url = '/api/security-logs';
            const params = [];

            if (date) params.push(`date=${encodeURIComponent(date)}`);
            if (initials) params.push(`initials=${encodeURIComponent(initials)}`);
            if (params.length) url += '?' + params.join('&');

            const res = await fetch(url, { credentials: 'include' });
            const logs = await res.json();

            const container = document.getElementById('securityLogContainer');

            if (!logs.length) {
                container.innerHTML = '<p>No logs found.</p>';
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="shift" style="border-left:4px solid #f2c744;">
                    <strong>${log.date} ${log.time}</strong> — <em>${log.location}</em><br>
                    ${log.description}<br>
                    <small>
                        Initials: ${log.initials} |
                        Submitted by: ${typeof log.submittedBy === 'object' ? (log.submittedBy.username || 'Unknown') : log.submittedBy}
                    </small>
                </div>
            `).join('');
        } catch (err) {
            console.error('Error loading logs:', err);
        }
    }

    function filterSecurityLogs() {
        const date = document.getElementById('filterDateLog').value;
        const initials = document.getElementById('filterInitialsLog').value;
        loadSecurityLogs(date, initials);
    }

    function clearSecurityFilters() {
        document.getElementById('filterDateLog').value = '';
        document.getElementById('filterInitialsLog').value = '';
        loadSecurityLogs();
    }

    function exportSecurityLogs() {
        const date = document.getElementById('filterDateLog').value;
        const initials = document.getElementById('filterInitialsLog').value;

        let url = '/api/security-logs?format=csv';

        if (date) url += `&date=${encodeURIComponent(date)}`;
        if (initials) url += `&initials=${encodeURIComponent(initials)}`;

        window.open(url, '_blank');
    }

    function logout() {
        fetch('/logout', {
            method: 'POST',
            credentials: 'include'
        }).then(() => location.href = 'login.html');
    }

    function switchToWorker() {
        fetch('/api/switch-to-worker', {
            method: 'POST',
            credentials: 'include'
        })
            .then(res => res.ok ? location.href = 'worker-dashboard.html' : alert('Only owner can switch.'))
            .catch(err => alert('Switch failed: ' + err.message));
    }

    async function goToAdmin() {
        const res = await fetch('/api/verify-owner', {
            method: 'GET',
            credentials: 'include'
        });

        if (res.ok) {
            window.location.href = 'admin-panel.html';
        } else {
            alert('Access denied');
        }
    }

    async function loadOwnerShiftCalendar() {
        try {
            const res = await fetch('/api/owner-calendar', { credentials: 'include' });

            if (res.status === 401) {
                location.href = 'login.html';
                return;
            }

            const events = await res.json();
            const calendarEl = document.getElementById('ownerShiftCalendar');

            if (ownerCalendar) {
                ownerCalendar.destroy();
            }

            ownerCalendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                height: 'auto',
                events,

                eventDidMount(info) {
                    const status = info.event.extendedProps.status;
                    const claimedBy = info.event.extendedProps.claimedBy;

                    if (status === 'claimed' && claimedBy) {
                        info.el.style.backgroundColor = '#2e7d32';
                        info.el.style.borderColor = '#2e7d32';
                    } else if (status === 'dropped') {
                        info.el.style.backgroundColor = '#f2c744';
                        info.el.style.borderColor = '#f2c744';
                        info.el.style.color = '#111';
                    } else {
                        info.el.style.backgroundColor = '#e63946';
                        info.el.style.borderColor = '#e63946';
                    }
                },

        eventClick(info) {
    const e = info.event;
    const p = e.extendedProps;

    const message =
`${e.title}

Date: ${p.date || 'N/A'}
Start Time: ${p.startTime || 'N/A'}
Expected End: ${p.expectedEnd || 'N/A'}
Location: ${p.location || 'N/A'}
Position: ${p.position || 'N/A'}
Status: ${p.status || 'N/A'}${p.status === 'dropped' && p.droppedBy ? ` by ${p.droppedBy}` : ''}
Claimed By: ${p.claimedBy || 'Open'}
Notes: ${p.notes || 'None'}

Click OK to assign this shift to a worker.`;

    if (confirm(message)) {
        openAssignModal(e.id);
    }
}

    document.addEventListener('DOMContentLoaded', () => {
        loadShifts();
        loadSecurityLogs();
        loadOwnerShiftCalendar();
    });
</script>
</body>
</html>
