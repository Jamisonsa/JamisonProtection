<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Interview Submissions | Jamison Protection</title>
    <style>
        body {
            background: #121212;
            color: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: #e63946;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
        }

        header button {
            background: #444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        main {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        th {
            background: #222;
            color: #f2c744;
        }

        tr:hover {
            background: #2b2b2b;
        }

        .action-btn {
            background: #e63946;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .link {
            color: #f2c744;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .status {
            font-size: 13px;
            color: #aaa;
        }
        /* Highlight scheduled interviews */
        tr.scheduled td {
            background-color: #18392b;
        }

    </style>
</head>
<body>
<header>
    <h1>Interview Submissions</h1>
    <button onclick="goBack()">⬅ Back to Owner Panel</button>
</header>

<main>
    <input type="text" id="searchBox" placeholder="Search name or email..." oninput="filterInterviews()" style="padding:8px; margin-bottom:10px; width:250px; border-radius:5px;">

    <table id="interviewTable">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Position</th>
            <th>Submitted</th>
            <th>Résumé</th>
            <th>Cover Letter</th>
            <th>Interview / Status</th>
            <th>Actions / Notes</th>
        </tr>
        </thead>
        <tbody id="interviewBody">
        <tr><td colspan="8" style="text-align:center;">Loading interviews...</td></tr>
        </tbody>
    </table>
</main>
<script>
    function goBack() {
        window.location.href = 'owner-panel.html';
    }

    async function loadInterviews() {
        const res = await fetch('/api/interviews', { credentials: 'include' });
        const data = await res.json();
        const tbody = document.getElementById('interviewBody');

        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No interview submissions yet.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(i => {
            const resumeIsPdf = i.resumeMimeType === 'application/pdf';
            const coverIsPdf = i.coverMimeType === 'application/pdf';

            return `
<tr class="${i.interviewTime ? 'scheduled' : ''}">
  <td>${i.name}</td>
  <td>${i.email}</td>
  <td>${i.position || '—'}</td>
  <td>${new Date(i.submittedAt).toLocaleString()}</td>

  <td>
    ${i.resumePath
                ? `
          ${resumeIsPdf ? `<a href="/api/interviews/file/${i._id}?type=resume&mode=preview" target="_blank" class="link">Preview</a> | ` : ''}
          <a href="/api/interviews/file/${i._id}?type=resume" class="link">Download</a>
        `
                : '—'}
  </td>

  <td>
    ${i.coverPath
                ? `
          ${coverIsPdf ? `<a href="/api/interviews/file/${i._id}?type=cover&mode=preview" target="_blank" class="link">Preview</a> | ` : ''}
          <a href="/api/interviews/file/${i._id}?type=cover" class="link">Download</a>
        `
                : '—'}
  </td>

  <td>
    ${i.interviewTime
                ? `<span class="status">📅 ${i.interviewTime}<br>
           🔗 <a href="${i.zoomLink}" target="_blank" class="link">Join</a><br>
           <button class="action-btn" onclick="navigator.clipboard.writeText('${i.zoomLink}')">Copy Link</button>
           </span>`
                : '<span class="status">Not scheduled</span>'}

    <div style="margin-top:8px;">
      <select onchange="updateStatus('${i._id}', this.value)" style="padding:6px; border-radius:4px;">
        <option value="New" ${i.status === 'New' ? 'selected' : ''}>New</option>
        <option value="Reviewed" ${i.status === 'Reviewed' ? 'selected' : ''}>Reviewed</option>
        <option value="Interview Scheduled" ${i.status === 'Interview Scheduled' ? 'selected' : ''}>Interview Scheduled</option>
        <option value="Rejected" ${i.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
        <option value="Hired" ${i.status === 'Hired' ? 'selected' : ''}>Hired</option>
      </select>
      <div class="status" style="margin-top:4px;">Status: ${i.status || 'New'}</div>
    </div>
  </td>

  <td>
    <button class="action-btn" onclick="schedule('${i._id}')">Schedule</button>
    <button class="action-btn" onclick="editNotes('${i._id}', ${JSON.stringify(i.notes || '')})" style="margin-top:6px;">Notes</button>
    <button class="action-btn" onclick="hireApplicant('${i._id}')" style="margin-top:6px; background:#2e7d32;">Hire</button>

    <div class="status" style="margin-top:8px;">
      ${i.notes ? `📝 ${i.notes}` : 'No notes yet'}
      ${i.hiredWorkerUsername ? `<br>👤 Worker: ${i.hiredWorkerUsername}` : ''}
    </div>
  </td>
</tr>
`;
        }).join('');
    }

    async function updateStatus(id, status) {
        const res = await fetch(`/api/interviews/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ status })
        });

        const data = await res.json();
        alert(data.message);
        loadInterviews();
    }

    async function editNotes(id, currentNotes) {
        const notes = prompt('Enter applicant notes:', currentNotes || '');
        if (notes === null) return;

        const res = await fetch(`/api/interviews/${id}/notes`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ notes })
        });

        const data = await res.json();
        alert(data.message);
        loadInterviews();
    }

    async function hireApplicant(id) {
        if (!confirm('Hire this applicant and create a worker account?')) return;

        const res = await fetch(`/api/interviews/${id}/hire`, {
            method: 'POST',
            credentials: 'include'
        });

        const data = await res.json();
        alert(data.message);
        loadInterviews();
    }

    async function schedule(id) {
        const time = prompt('Enter interview date/time (e.g. Nov 10 2025 10:00 AM):');
        if (!time) return;

        const meetLink = prompt('Paste the Google Meet link:');
        if (!meetLink) return;

        const res = await fetch('/api/interviews/schedule', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ id, time, meetLink })
        });

        const data = await res.json();
        alert(data.message);
        loadInterviews();
    }

    function filterInterviews() {
        const q = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('#interviewBody tr').forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(q) ? '' : 'none';
        });
    }

    loadInterviews();
</script>
</body>
</html>
