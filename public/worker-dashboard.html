<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worker Dashboard | Jamison Protection</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        header {
            background: #1c1c1c;
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #444;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        main {
            max-width: 1100px;
            margin: auto;
            padding: 25px;
        }
        form {
            background: #1f1f1f;
            padding: 20px;
            margin-top: 30px;
            border-left: 5px solid #e63946;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            color: white;
            border: none;
            margin: 10px 0;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #e63946;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .shift {
            background: #1f1f1f;
            margin: 15px 0;
            padding: 15px;
            border-left: 5px solid #e63946;
            border-radius: 8px;
        }
        #securityLogFilter input, #securityLogFilter button {
            margin: 5px;
            padding: 8px;
            border-radius: 5px;
            border: none;
            width: auto;
        }
        #securityLogFilter button {
            background: #e63946;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #securityLogFilter button:hover {
            background: #c5303d;
        }
        #logHoursForm {
            border-left: 5px solid #4CAF50;
        }
        #logHoursForm button {
            background: #4CAF50;
        }
        #logHoursForm button:hover {
            background: #3e8e41;
        }
        #shiftCalendar {
            background: #1f1f1f;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .fc {
            background: #1f1f1f;
            color: white;
        }
        .fc-toolbar-title {
            color: #f2c744;
        }
        .fc-button {
            background: #e63946 !important;
            border: none !important;
            color: white !important;
        }
        .fc-button:hover {
            background: #c5303d !important;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 100px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
        }

        .modal-content {
            background-color: #1f1f1f;
            margin: auto;
            padding: 25px;
            border-radius: 10px;
            width: 400px;
            color: white;
            border-left: 5px solid #e63946;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        .close:hover {
            color: white;
        }
    </style>
</head>
<div id="shiftModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>

        <p><strong>Date:</strong> <span id="modalDate"></span></p>
        <p><strong>Start Time:</strong> <span id="modalStart"></span></p>
        <p><strong>Expected End:</strong> <span id="modalEnd"></span></p>
        <p><strong>Location:</strong> <span id="modalLocation"></span></p>
        <p><strong>Position:</strong> <span id="modalPosition"></span></p>
        <p><strong>Notes:</strong> <span id="modalNotes"></span></p>

        <div style="margin-top: 18px; display:flex; gap:10px;">
            <button id="modalActionBtn" onclick="handleModalShiftAction()"></button>
            <button onclick="closeModal()" style="background:#444;">Close</button>
        </div>
    </div>
</div>
<body>

<header>
    <h1 id="welcomeMsg">Worker Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
    <button onclick="switchToOwner()">Switch to Owner View</button>
</header>

<main>
    <h2>Available Shifts</h2>
    <div id="shiftList"></div>

    <h2>My Shifts</h2>
    <div id="myShiftList"></div>

    <hr>

    <h2>Shift Calendar</h2>
    <div id="shiftCalendar"></div>

    <h2>Log Your Hours</h2>
    <form id="logHoursForm" onsubmit="submitHours(event)">
        <label>Date:</label>
        <input type="date" id="hoursDate" required>

        <label>Start Time:</label>
        <input type="time" id="hoursStart" required>

        <label>End Time:</label>
        <input type="time" id="hoursEnd" required>

        <label>Location:</label>
        <select id="hoursLocation" required>
            <option value="John Carroll School">John Carroll School</option>
        </select>

        <label>Work Position:</label>
        <input type="text" id="hoursPosition" placeholder="e.g. Front Desk" required>

        <label>Hours Worked:</label>
        <input type="number" id="hoursWorked" step="0.1" placeholder="e.g. 5.5" required>

        <button type="submit">Submit Hours</button>
    </form>

    <hr>

    <h2>Daily Security Log</h2>
    <form id="securityLogForm" onsubmit="submitSecurityLog(event)">
        <label>Date:</label>
        <input type="date" id="securityDate" required>

        <label>Time:</label>
        <input type="time" id="securityTime" required>

        <label>Location:</label>
        <select id="securityLocation" required>
            <option value="John Carroll School">John Carroll School</option>
        </select>

        <label>Description:</label>
        <textarea id="securityDescription" placeholder="Describe the event or observation..." required></textarea>

        <label>Worker Initials:</label>
        <input type="text" id="securityInitials" maxlength="3" placeholder="e.g. FJ" required>

        <button type="submit">Submit Log</button>
    </form>

    <hr>

    <h3>All Security Logs</h3>

    <div id="securityLogFilter" style="margin-bottom: 15px;">
        <label>Date:</label>
        <input type="date" id="filterDate">

        <label>Worker Initials:</label>
        <input type="text" id="filterInitials" placeholder="e.g. FJ">

        <button onclick="filterSecurityLogs()">Apply Filter</button>
        <button onclick="clearSecurityFilters()">Clear</button>
        <button onclick="exportSecurityLogs()">⬇ Export CSV</button>
    </div>

    <div id="securityLogsContainer">
        <p>Loading logs...</p>
    </div>

    <hr>

    <h2>Change Password</h2>
    <form id="changePasswordForm" onsubmit="changePassword(event)">
        <label>Old Password:</label>
        <input type="password" id="oldPassword" required>

        <label>New Password:</label>
        <input type="password" id="newPassword" required>

        <button type="submit">Update Password</button>
    </form>
</main>

<script>
    let calendar;
    let selectedShiftId = null;
    let selectedShiftType = null;

    async function loadShifts() {
        const res = await fetch('/api/shifts', { credentials: 'include' });
        if (res.status === 401) return (location.href = 'login.html');

        const shifts = await res.json();
        const available = shifts.filter(s => s.status !== 'claimed');

        const container = document.getElementById('shiftList');
        container.innerHTML = available.length
            ? available.map(s => `
                <div class="shift">
                    <strong>${s.date} at ${s.startTime || 'N/A'}</strong><br>
                    Ends: ${s.expectedEnd || 'N/A'}<br>
                    Location: ${s.location}<br>
                    Position: ${s.position || 'Unassigned'}<br>
                    Notes: ${s.notes || 'None'}<br>
                    Status: ${s.status}<br>
                    <button onclick="claimShift('${s._id}')">Claim</button>
                </div>
            `).join('')
            : '<p>No available shifts at this time.</p>';
    }

    async function loadMyShifts() {
        const res = await fetch('/api/my-shifts', { credentials: 'include' });
        if (res.status === 401) return (location.href = 'login.html');

        const shifts = await res.json();

        const container = document.getElementById('myShiftList');
        container.innerHTML = shifts.length
            ? shifts.map(s => `
                <div class="shift">
                    <strong>${s.date} at ${s.startTime || 'N/A'}</strong><br>
                    Ends: ${s.expectedEnd || 'N/A'}<br>
                    Location: ${s.location}<br>
                    Position: ${s.position || 'Unassigned'}<br>
                    Notes: ${s.notes || 'None'}<br>
                    <button onclick="dropShift('${s._id}')">Drop Shift</button>
                </div>
            `).join('')
            : '<p>You have no claimed shifts.</p>';
    }

    async function loadShiftCalendar() {
        try {
            const res = await fetch('/api/worker-calendar', { credentials: 'include' });
            if (res.status === 401) return location.href = 'login.html';

            const events = await res.json();
            const calendarEl = document.getElementById('shiftCalendar');

            if (calendar) {
                calendar.destroy();
            }

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                height: 'auto',
                events,
                eventDidMount(info) {
                    if (info.event.extendedProps.type === 'claimed') {
                        info.el.style.backgroundColor = '#2e7d32';
                        info.el.style.borderColor = '#2e7d32';
                    } else {
                        info.el.style.backgroundColor = '#e63946';
                        info.el.style.borderColor = '#e63946';
                    }
                },
                eventClick(info) {
                    const e = info.event;
                    const p = e.extendedProps;

                    selectedShiftId = e.id;
                    selectedShiftType = p.type || 'available';

                    document.getElementById("modalTitle").textContent = e.title;
                    document.getElementById("modalDate").textContent = p.date || "N/A";
                    document.getElementById("modalStart").textContent = p.startTime || "N/A";
                    document.getElementById("modalEnd").textContent = p.expectedEnd || "N/A";
                    document.getElementById("modalLocation").textContent = p.location || "N/A";
                    document.getElementById("modalPosition").textContent = p.position || "N/A";
                    document.getElementById("modalNotes").textContent = p.notes || "None";

                    const actionBtn = document.getElementById("modalActionBtn");

                    if (selectedShiftType === 'claimed') {
                        actionBtn.textContent = "Drop Shift";
                        actionBtn.style.background = "#b8860b";
                    } else {
                        actionBtn.textContent = "Claim Shift";
                        actionBtn.style.background = "#e63946";
                    }

                    document.getElementById("shiftModal").style.display = "block";
                }
            });

            calendar.render();
        } catch (err) {
            console.error('Failed to load shift calendar:', err);
        }
    }
    function closeModal() {
        document.getElementById("shiftModal").style.display = "none";
        selectedShiftId = null;
        selectedShiftType = null;
    }
    async function handleModalShiftAction() {
        if (!selectedShiftId) return;

        try {
            let url = '';
            let body = {};

            if (selectedShiftType === 'claimed') {
                url = '/api/drop';
                body = { shiftId: selectedShiftId };
            } else {
                url = '/api/claim';
                body = { shiftId: selectedShiftId };
            }

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(body)
            });

            const data = await res.json();
            alert(data.message);

            closeModal();
            await loadShifts();
            await loadMyShifts();
            await loadShiftCalendar();
        } catch (err) {
            alert('Error updating shift: ' + err.message);
        }
    }
    window.onclick = function(event) {
        const modal = document.getElementById("shiftModal");
        if (event.target === modal) {
            modal.style.display = "none";
        }
    };
    async function submitHours(event) {
        event.preventDefault();

        const log = {
            date: document.getElementById('hoursDate').value,
            startTime: document.getElementById('hoursStart').value,
            endTime: document.getElementById('hoursEnd').value,
            location: document.getElementById('hoursLocation').value,
            position: document.getElementById('hoursPosition').value,
            hours: document.getElementById('hoursWorked').value
        };

        const res = await fetch('/api/log-hours', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(log)
        });

        const data = await res.json();
        alert(data.message);
        document.getElementById('logHoursForm').reset();
    }

    async function submitSecurityLog(event) {
        event.preventDefault();

        const log = {
            date: document.getElementById('securityDate').value,
            time: document.getElementById('securityTime').value,
            location: document.getElementById('securityLocation').value,
            description: document.getElementById('securityDescription').value,
            initials: document.getElementById('securityInitials').value
        };

        const res = await fetch('/api/security-logs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(log)
        });

        const data = await res.json();
        alert(data.message);
        document.getElementById('securityLogForm').reset();
        loadSecurityLogs();
    }

    async function loadSecurityLogs(date = '', initials = '') {
        try {
            let url = '/api/security-logs';
            const params = [];
            if (date) params.push(`date=${encodeURIComponent(date)}`);
            if (initials) params.push(`initials=${encodeURIComponent(initials)}`);
            if (params.length) url += '?' + params.join('&');

            const res = await fetch(url, { credentials: 'include' });
            const logs = await res.json();

            const container = document.getElementById('securityLogsContainer');
            if (!logs.length) {
                container.innerHTML = '<p>No logs found for selected criteria.</p>';
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="shift" style="background:#1f1f1f; margin:8px 0; padding:10px; border-left:4px solid #f2c744;">
                    <strong>${log.date} ${log.time}</strong> — <em>${log.location}</em><br>
                    ${log.description}<br>
                    <small>Initials: ${log.initials} | Submitted by: ${log.submittedBy}</small>
                </div>
            `).join('');
        } catch (err) {
            console.error('Failed to load security logs:', err);
        }
    }

    async function changePassword(event) {
        event.preventDefault();

        const oldPassword = document.getElementById('oldPassword').value.trim();
        const newPassword = document.getElementById('newPassword').value.trim();

        if (!oldPassword || !newPassword) {
            return alert('Please enter both old and new passwords.');
        }

        try {
            const res = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ oldPassword, newPassword })
            });

            const data = await res.json();
            alert(data.message);

            if (res.ok) {
                document.getElementById('changePasswordForm').reset();
            }
        } catch (err) {
            alert('Error: ' + err.message);
        }
    }

    function filterSecurityLogs() {
        const date = document.getElementById('filterDate').value;
        const initials = document.getElementById('filterInitials').value;
        loadSecurityLogs(date, initials);
    }

    function clearSecurityFilters() {
        document.getElementById('filterDate').value = '';
        document.getElementById('filterInitials').value = '';
        loadSecurityLogs();
    }

    function exportSecurityLogs() {
        const date = document.getElementById('filterDate').value;
        const initials = document.getElementById('filterInitials').value;

        let url = '/api/security-logs?format=csv';
        if (date) url += `&date=${encodeURIComponent(date)}`;
        if (initials) url += `&initials=${encodeURIComponent(initials)}`;

        window.open(url, '_blank');
    }

    async function claimShift(id) {
        const res = await fetch('/api/claim', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ shiftId: id })
        });

        const data = await res.json();
        alert(data.message);
        await loadShifts();
        await loadMyShifts();
        await loadShiftCalendar();
    }

    async function dropShift(shiftId) {
        const res = await fetch('/api/drop', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ shiftId })
        });

        const data = await res.json();
        alert(data.message);
        await loadShifts();
        await loadMyShifts();
        await loadShiftCalendar();
    }

    async function logout() {
        try {
            const res = await fetch('/logout', {
                method: 'POST',
                credentials: 'include'
            });
            if (res.ok) {
                window.location.href = 'login.html';
            } else {
                alert('Logout failed.');
            }
        } catch (err) {
            alert('Error logging out: ' + err.message);
        }
    }

    async function switchToOwner() {
        try {
            const res = await fetch('/api/switch-to-owner', {
                method: 'POST',
                credentials: 'include'
            });
            if (res.ok) {
                window.location.href = 'owner-panel.html';
            } else {
                const data = await res.json();
                alert(data.message || 'Only owners can switch to owner view.');
            }
        } catch (err) {
            alert('Error switching view: ' + err.message);
        }
    }

    fetch('/api/session-debug', { credentials: 'include' })
        .then(res => res.json())
        .then(data => {
            if (!data.user) return (location.href = 'login.html');
            console.log('Logged in as:', data.user);
            loadShifts();
            loadMyShifts();
            loadShiftCalendar();
            loadSecurityLogs();
        })
        .catch(err => console.error('Session check failed:', err));
</script>

</body>
</html>
